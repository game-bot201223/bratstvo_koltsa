upstream game_backend_pool {
    least_conn;
    server 127.0.0.1:8081 max_fails=3 fail_timeout=5s;
    server 127.0.0.1:8082 max_fails=3 fail_timeout=5s;
}

upstream game_backend_ws_sticky {
    ip_hash;
    server 127.0.0.1:8081 max_fails=3 fail_timeout=5s;
    server 127.0.0.1:8082 max_fails=3 fail_timeout=5s;
}

server {
    listen 80;
    listen [::]:80;
    server_name bratstvokoltsa.com www.bratstvokoltsa.com;

    root /var/www/game;
    index index.html;

    location /functions/v1/ {
        limit_req zone=api burst=30 nodelay;
        limit_conn conn_limit_per_ip 20;
        proxy_pass http://game_backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        limit_conn conn_limit_per_ip 20;
        proxy_pass http://game_backend_ws_sticky/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://game_backend_pool/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=general burst=60 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Force fresh app shell for Telegram WebView.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }
}
