[DEFAULT]
bantime = 3600
findtime = 600
maxretry = 3
backend = systemd
# This VPS/container doesn't allow modifying firewall via netlink (iptables/nft fail),
# so we use the no-op action to prevent fail2ban from logging errors.
banaction = dummy

[sshd]
enabled = true
port = ssh
logpath = %(sshd_log)s
maxretry = 3
bantime = 3600

[nginx-http-auth]
enabled = true
port = http,https
logpath = %(nginx_access_log)s
maxretry = 5
bantime = 1800

[nginx-limit-req]
enabled = true
port = http,https
logpath = %(nginx_error_log)s
maxretry = 10
bantime = 600

[nginx-botsearch]
enabled = true
port = http,https
logpath = %(nginx_access_log)s
maxretry = 3
bantime = 3600

[recidive]
enabled = true
logpath = /var/log/fail2ban.log
bantime = 86400
findtime = 86400
maxretry = 3
